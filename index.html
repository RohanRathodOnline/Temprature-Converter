<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Temperature Converter | Rohan Rathod</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- header: title and a small info button -->
    <div class="header">
        <h1>Temperature Converter</h1>
        <!-- small info icon -->
        <button class="info-btn" title="Conversion formulas">i</button>
    </div>

    <p class="subtitle">
        Convert between Celsius, Fahrenheit and Kelvin
    </p>

    <!-- temperature input -->
    <div class="input-group">
        <input 
            type="number" 
            id="temperature" 
            placeholder="Enter temperature"
        >
    </div>

    <!-- pick units -->
    <div class="select-group">
        <select id="fromUnit">
            <option value="C">Celsius (°C)</option>
            <option value="F">Fahrenheit (°F)</option>
            <option value="K">Kelvin (K)</option>
        </select>

        <span class="arrow">→</span>

        <select id="toUnit">
            <option value="F">Fahrenheit (°F)</option>
            <option value="C">Celsius (°C)</option>
            <option value="K">Kelvin (K)</option>
        </select>
    </div>

    <!-- convert button -->
    <button id="convertBtn">Convert</button>

    <!-- result output -->
    <div class="result" id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
